name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Dejamos la versión vacía para que use la última estable disponible en el runner
          flutter-version: '' 
      - name: Check Versions
        run: |
          flutter --version
          dart --version
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: glyph-apk
          path: build/app/outputs/flutter-apk/app-release.apk
