name: "Generar IPA para AltStore"
on:
  workflow_dispatch: # Esto activa un botón para compilar cuando tú quieras

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar paquetes
        run: |
          flutter pub get
          flutter pub upgrade --major-versions

      - name: Generar Iconos
        run: |
          flutter pub run flutter_launcher_icons

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Corregir el Podfile si tiene rutas de Windows hardcodeadas
          sed -i '' 's|.*flutter_root.*=.*|flutter_root = ENV["FLUTTER_ROOT"]|g' ios/Podfile

          # Configuración de Identificador y Target
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = "com.xglyphx.glyph";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Parche de Podfile
          if [ -f ios/Podfile ]; then
            perl -i -pe 's/flutter_additional_ios_build_settings\((target|installer)\)/flutter_additional_ios_build_settings($1)\n      target.build_configurations.each { |config| config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" }/g' ios/Podfile
          fi

          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ABCDEFGH12;/g' ios/Runner.xcodeproj/project.pbxproj

          # Generar configuración de release
          printf "ENABLE_USER_SCRIPT_SANDBOXING = NO\nCODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nPROVISIONING_PROFILE_SPECIFIER =\nDEVELOPMENT_TEAM = ABCDEFGH12\nNATIVE_ASSETS_DIR = \$(PROJECT_DIR)/../build/native_assets\nNATIVE_ASSETS_MANIFEST = \$(NATIVE_ASSETS_DIR)/native_assets.json\n" > ios/Flutter/Release.xcconfig

      - name: Crear App sin firma
        run: |
          sudo gem install cocoapods --no-document
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..
          
          flutter clean

          # Evitar crash de Native Assets en compilaciones sin firma
          mkdir -p build/native_assets
          touch build/native_assets/native_assets.json

          # Set environment variables to avoid 'Null check operator' crash
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12"
          export CODE_SIGNING_METHOD=manual
          export NATIVE_ASSETS_DIR="$(pwd)/build/native_assets"

          flutter build ios --release --no-codesign \
            --no-tree-shake-icons

          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # Use ditto to create the IPA; preserves resource forks correctly for iOS
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
