name: "Generar IPA para AltStore"
on:
  workflow_dispatch: # Esto activa un botón para compilar cuando tú quieras

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar paquetes
        run: flutter pub get

      - name: Generar Iconos
        run: flutter pub run flutter_launcher_icons:main

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Forzar el Bundle ID y actualizar el Target de iOS a 12.0
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.xglyphx.glyph;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Crear App sin firma
        run: |
          # Ensure CocoaPods is available
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document || true
          fi
          pod repo update || true
          
          flutter clean
          flutter pub get

          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # Use ditto to create the IPA; preserves resource forks correctly for iOS
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
