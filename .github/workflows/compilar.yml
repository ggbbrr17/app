name: "Generar IPA para AltStore"
on:
  workflow_dispatch: # Esto activa un botón para compilar cuando tú quieras

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar paquetes
        run: |
          # Eliminar rastro de configuraciones locales de Windows que puedan estar en el repo
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          rm -f ios/.flutter-plugins
          rm -f ios/.flutter-plugins-dependencies

          flutter clean
          flutter pub get
          flutter build ios --config-only || true

      - name: Generar Iconos
        run: |
          dart run flutter_launcher_icons

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Forzar al Podfile a usar la ruta de Flutter del servidor
          sed -i '' 's|.*flutter_root.*=.*|flutter_root = ENV["FLUTTER_ROOT"]|g' ios/Podfile

          # Configuración de Identificador y Target
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = "com.xglyphx.glyph";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Parche de Podfile
          if [ -f ios/Podfile ]; then
            perl -i -pe 's/flutter_additional_ios_build_settings\((target|installer)\)/flutter_additional_ios_build_settings($1)\n      target.build_configurations.each { |config| config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" }/g' ios/Podfile
          fi

          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ABCDEFGH12;/g' ios/Runner.xcodeproj/project.pbxproj

          # Configurar Permisos de Red (Permitir HTTP para APIs externas)
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity:NSAllowsLocalNetworking" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool YES" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads YES" ios/Runner/Info.plist
          
          # Eliminar archivo SceneDelegate si existe para volver al flujo clásico
          rm -f ios/Runner/SceneDelegate.swift
          
          # Asegurar que el SceneManifest sea eliminado si existe (evita pantalla negra)
          /usr/libexec/PlistBuddy -c "Delete :UIApplicationSceneManifest" ios/Runner/Info.plist || true

          # Desactivar Impeller para evitar pantalla negra
          /usr/libexec/PlistBuddy -c "Add :FLTEnableImpeller bool NO" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :FLTEnableImpeller NO" ios/Runner/Info.plist
          echo "✅ Impeller desactivado"

          # Generar configuración de release
          printf "#include \"Generated.xcconfig\"\n#include \"../Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig\"\nENABLE_USER_SCRIPT_SANDBOXING = NO\nCODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nPROVISIONING_PROFILE_SPECIFIER =\nDEVELOPMENT_TEAM = ABCDEFGH12\nNATIVE_ASSETS_DIR = \$(PROJECT_DIR)/../build/native_assets\nNATIVE_ASSETS_MANIFEST = \$(NATIVE_ASSETS_DIR)/native_assets.json\n" > ios/Flutter/Release.xcconfig

      - name: Crear App sin firma
        run: |
          sudo gem install cocoapods --no-document
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..
          
          # Evitar crash de Native Assets en compilaciones sin firma
          mkdir -p build/native_assets
          touch build/native_assets/native_assets.json

          # Set environment variables to avoid 'Null check operator' crash
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12"
          export CODE_SIGNING_METHOD=manual
          export NATIVE_ASSETS_DIR="$(pwd)/build/native_assets"

          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1 \
            --no-tree-shake-icons

          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # Use ditto to create the IPA; preserves resource forks correctly for iOS
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
