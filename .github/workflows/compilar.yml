name: "Generar IPA para AltStore"
on:
  workflow_dispatch: # Esto activa un botón para compilar cuando tú quieras

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Descargar paquetes
        run: flutter pub get

      - name: Crear App sin firma
        run: |
          # Ensure CocoaPods is available
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document || true
          fi
          pod repo update || true

          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mi_aplicacion.ipa Payload/

      - name: Guardar archivo final
        uses: actions/upload-artifact@v3
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
