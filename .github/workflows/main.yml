name: "CI - Glyph Mobile"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar Iconos y Preparar Dependencias
        run: |
          # Limpieza profunda de archivos que causan errores de ruta en CI
          flutter clean
          flutter pub get
          
          # Asegurar que el Bundle ID sea el correcto en el proyecto de Xcode
          sed -i '' 's/com.example.myapp/com.xglyphx.app/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Usar Release.xcconfig para que los cambios persistan y no sean sobrescritos
          echo "ENABLE_USER_SCRIPT_SANDBOXING = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = " >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM = ABCDEFGH12" >> ios/Flutter/Release.xcconfig # Dummy team ID
          
          dart run flutter_launcher_icons

      - name: Crear App sin firma
        run: |
          # Set environment variables for the build
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12" # Dummy team ID
          export CODE_SIGN_ENTITLEMENTS=""
          export CODE_SIGNING_METHOD=manual
          
          # Compilación forzando la omisión de firma de código
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1
          
          # Empaquetado manual en formato IPA
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mi_aplicacion.ipa Payload/

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
