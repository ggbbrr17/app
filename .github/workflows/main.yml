name: "Generar IPA para AltStore"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar Iconos y Preparar Dependencias
        run: |
          flutter clean
          rm -rf ios/Flutter/Generated.xcconfig
          rm -rf ios/Flutter/flutter_export_environment.sh
          flutter pub get
          # Forzar iOS 13.0 y eliminar requisitos de firma/equipo para evitar errores en CI
          # Desactivar firma de código y configurar target en project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = "Apple Development";/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGNING_REQUIRED/d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGNING_ALLOWED/d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/OTHER_CODE_SIGN_FLAGS/d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER/a \
                  CODE_SIGNING_REQUIRED = NO;\
                  CODE_SIGNING_ALLOWED = NO;' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ENABLE_USER_SCRIPT_SANDBOXING = YES;/ENABLE_USER_SCRIPT_SANDBOXING = NO;/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";/DEBUG_INFORMATION_FORMAT = "DWARF";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = YES;/ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/VALID_ARCHS = .*/VALID_ARCHS = arm64;/g' ios/Runner.xcodeproj/project.pbxproj

          # Añadir overrides a Generated.xcconfig para asegurar que se apliquen
          echo "ENABLE_USER_SCRIPT_SANDBOXING = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Generated.xcconfig
          echo "DEBUG_INFORMATION_FORMAT = DWARF" >> ios/Flutter/Generated.xcconfig
          echo "ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = NO" >> ios/Flutter/Generated.xcconfig
          echo "VALID_ARCHS = arm64" >> ios/Flutter/Generated.xcconfig

          if [ -f ios/Podfile ]; then
            sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/g" ios/Podfile
            # Inyectar el override de target en el bloque post_install para todos los pods
            sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each { |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                  config.build_settings["SDKROOT"] = "iphoneos" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["ENABLE_USER_SCRIPT_SANDBOXING"] = "NO" \
                  config.build_settings["DEBUG_INFORMATION_FORMAT"] = "DWARF" \
                  config.build_settings["ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES"] = "NO" \
                  config.build_settings["VALID_ARCHS"] = "arm64" \
                }' ios/Podfile
          fi
          dart run flutter_launcher_icons
          cd ios && pod install && cd ..

      - name: Crear App sin firma
        run: |
          export CODE_SIGNING_ALLOWED=NO
          flutter build ios --release --no-codesign --verbose --extra-front-end-options=--no-implicit-dynamic-calls
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mi_aplicacion.ipa Payload/

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4 # Actualizado a v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
