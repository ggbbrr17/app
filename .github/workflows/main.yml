name: "Generar IPA - Glyph Mobile"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preparar Dependencias
        run: |
          # Eliminar rastro de configuraciones locales de Windows que puedan estar en el repo
          rm -f ios/Flutter/Generated.xcconfig
          rm -f ios/Flutter/flutter_export_environment.sh
          rm -f ios/.flutter-plugins
          rm -f ios/.flutter-plugins-dependencies

          flutter clean
          flutter pub get
          flutter build ios --config-only || true

      - name: Analizar Código
        run: flutter analyze

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Forzar al Podfile a usar la ruta de Flutter del servidor
          sed -i '' 's|.*flutter_root.*=.*|flutter_root = ENV["FLUTTER_ROOT"]|g' ios/Podfile

          # Forzar el Bundle ID y actualizar el Target de iOS a 13.0
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = "com.xglyphx.glyph";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Parche robusto para forzar iOS 13.0 en todos los Pods (evita advertencias de iOS 11/9)
          if [ -f ios/Podfile ]; then
            perl -i -pe 's/flutter_additional_ios_build_settings\((target|installer)\)/flutter_additional_ios_build_settings($1)\n      target.build_configurations.each { |config| config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" }/g' ios/Podfile
          fi

          # Forzar deshabilitación de firma y asignar un Team ID ficticio para engañar al validador de Flutter
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          # Insertar un DEVELOPMENT_TEAM si no existe para evitar el error de Flutter
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ABCDEFGH12;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Impeller is enabled by default in modern Flutter and should not be disabled.

          # Agregar permisos necesarios para iOS (Micrófono, Galería, Archivos)
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Glyph necesita acceso al micrófono para grabar audio.'" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'Glyph necesita acceso al micrófono para grabar audio.'" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Glyph necesita acceso a la galería para subir archivos.'" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Glyph necesita acceso a la galería para subir archivos.'" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSAppleMusicUsageDescription string 'Glyph necesita acceso a los archivos multimedia.'" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSAppleMusicUsageDescription 'Glyph necesita acceso a los archivos multimedia.'" ios/Runner/Info.plist
          
          # Configurar Permisos de Red (Permitir HTTP para APIs externas)
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity:NSAllowsLocalNetworking" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool YES" ios/Runner/Info.plist || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads YES" ios/Runner/Info.plist

          echo "✅ Permisos de iOS inyectados en Info.plist"
          
          # Generar Release.xcconfig sin problemas de sangría YAML
          printf "#include \"Generated.xcconfig\"\n#include \"../Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig\"\nENABLE_USER_SCRIPT_SANDBOXING = NO\nCODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nPROVISIONING_PROFILE_SPECIFIER =\nDEVELOPMENT_TEAM = ABCDEFGH12\nNATIVE_ASSETS_DIR = \$(PROJECT_DIR)/../build/native_assets\nNATIVE_ASSETS_MANIFEST = \$(NATIVE_ASSETS_DIR)/native_assets.json\n" > ios/Flutter/Release.xcconfig

      - name: Instalar CocoaPods (si es necesario)
        run: |
          sudo gem install cocoapods --no-document
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..

      - name: Generar Iconos
        run: |
          dart run flutter_launcher_icons

      - name: Crear App sin firma
        run: |
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12"
          export CODE_SIGNING_METHOD=manual

          mkdir -p build/native_assets
          touch build/native_assets/native_assets.json
          export NATIVE_ASSETS_DIR="$(pwd)/build/native_assets"

          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1 \
            --no-tree-shake-icons

          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Diagnosticar Info.plist
        run: |
          set -e
          if [ -f Payload/Runner.app/Info.plist ]; then
            plutil -p Payload/Runner.app/Info.plist > info_plist_dump.txt || true
            echo "---- file type ----" > info_plist_file.txt
            file Payload/Runner.app/Info.plist >> info_plist_file.txt || true
            xxd -l 256 Payload/Runner.app/Info.plist > info_plist_hexdump.txt || true
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt info_plist_file.txt info_plist_hexdump.txt || true
          else
            echo "Info.plist not found" > info_plist_dump.txt
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt || true
          fi

      - name: Subir diagnóstico Info.plist
        uses: actions/upload-artifact@v4
        with:
          name: info-plist-diag
          path: info_plist_diag.tar.gz

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
