name: "Generar IPA para AltStore"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar Iconos y Preparar Dependencias
        run: |
          flutter clean
          rm -rf ios/Flutter/Generated.xcconfig
          rm -rf ios/Flutter/flutter_export_environment.sh
          flutter pub get
          # Forzar iOS 12.0 y eliminar requisitos de firma/equipo para evitar errores en CI
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 9.0;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          if [ -f ios/Podfile ]; then
            sed -i '' "s/platform :ios, '.*'/platform :ios, '12.0'/g" ios/Podfile
            # Inyectar el override de target en el bloque post_install para todos los pods
            sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each { |config| \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "12.0" \
                  config.build_settings["SDKROOT"] = "iphoneos" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                }' ios/Podfile
          fi
          dart run flutter_launcher_icons
          cd ios && pod install && cd ..

      - name: Crear App sin firma
        run: |
          flutter build ios --release --no-codesign --verbose
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mi_aplicacion.ipa Payload/

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4 # Actualizado a v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
