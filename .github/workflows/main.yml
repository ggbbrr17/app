name: "CI - Glyph Mobile"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preparar Dependencias
        run: |
          flutter clean
          flutter pub get

      - name: Analizar Código
        run: flutter analyze

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Forzar el Bundle ID y actualizar el Target de iOS a 12.0
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.xglyphx.app;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Cambiar estilo de firma a Manual para evitar que Flutter exija un Team ID real
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Inyectar overrides en Release.xcconfig para asegurar que Xcode no intente firmar
          cat > ios/Flutter/Release.xcconfig <<'EOF'
ENABLE_USER_SCRIPT_SANDBOXING = NO
CODE_SIGNING_ALLOWED = NO
CODE_SIGNING_REQUIRED = NO
CODE_SIGN_IDENTITY =
PROVISIONING_PROFILE_SPECIFIER =
DEVELOPMENT_TEAM = ABCDEFGH12
EOF

      - name: Instalar CocoaPods (si es necesario)
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document || true
          fi
          pod repo update || true

      - name: Generar Iconos
        run: dart run flutter_launcher_icons

      - name: Crear App sin firma
        run: |
          # Set environment variables for the build
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12" # Dummy team ID
          export CODE_SIGN_ENTITLEMENTS=""
          export CODE_SIGNING_METHOD=manual
          
          # Compilación forzando la omisión de firma de código
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1
          
          # Empaquetado manual en formato IPA
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # Asegurar que Info.plist esté en formato XML legible (evita errores NSCocoaErrorDomain 3480)
          if [ -f Payload/Runner.app/Info.plist ]; then
            plutil -convert xml1 -o Payload/Runner.app/Info.plist Payload/Runner.app/Info.plist || true
          fi
          # Use ditto to create the IPA; preserves resource forks correctly for iOS
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Diagnosticar Info.plist
        run: |
          set -e
          unzip -q mi_aplicacion.ipa -d ipa_unpack || true
          if [ -f ipa_unpack/Payload/Runner.app/Info.plist ]; then
            plutil -p ipa_unpack/Payload/Runner.app/Info.plist > info_plist_dump.txt || true
            echo "---- file type ----" > info_plist_file.txt
            file ipa_unpack/Payload/Runner.app/Info.plist >> info_plist_file.txt || true
            xxd -l 256 ipa_unpack/Payload/Runner.app/Info.plist > info_plist_hexdump.txt || true
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt info_plist_file.txt info_plist_hexdump.txt || true
          else
            echo "Info.plist not found" > info_plist_dump.txt
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt || true
          fi

      - name: Subir diagnóstico Info.plist
        uses: actions/upload-artifact@v4
        with:
          name: info-plist-diag
          path: info_plist_diag.tar.gz

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
