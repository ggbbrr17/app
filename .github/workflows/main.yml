name: "Generar IPA - Glyph Mobile"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preparar Dependencias
        run: |
          flutter clean
          flutter pub get
          flutter pub upgrade --major-versions

      - name: Analizar Código
        run: flutter analyze

      - name: Configurar Xcode (Sin Firma)
        run: |
          # Corregir el Podfile si tiene rutas de Windows hardcodeadas (causa del error podhelper)
          sed -i '' 's|.*flutter_root.*=.*C:.*|flutter_root = ENV["FLUTTER_ROOT"]|g' ios/Podfile

          # Forzar el Bundle ID y actualizar el Target de iOS a 12.0
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = "com.xglyphx.glyph";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [^;]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Parche robusto para forzar iOS 13.0 en todos los Pods (evita advertencias de iOS 11/9)
          if [ -f ios/Podfile ]; then
            perl -i -pe 's/flutter_additional_ios_build_settings\((target|installer)\)/flutter_additional_ios_build_settings($1)\n      target.build_configurations.each { |config| config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" }/g' ios/Podfile
          fi

          # Forzar deshabilitación de firma y asignar un Team ID ficticio para engañar al validador de Flutter
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          # Insertar un DEVELOPMENT_TEAM si no existe para evitar el error de Flutter
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ABCDEFGH12;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Generar Release.xcconfig sin problemas de sangría YAML
          printf "ENABLE_USER_SCRIPT_SANDBOXING = NO\nCODE_SIGNING_ALLOWED = NO\nCODE_SIGNING_REQUIRED = NO\nCODE_SIGN_IDENTITY =\nPROVISIONING_PROFILE_SPECIFIER =\nDEVELOPMENT_TEAM = ABCDEFGH12\nNATIVE_ASSETS_DIR = \$(PROJECT_DIR)/../build/native_assets\nNATIVE_ASSETS_MANIFEST = \$(NATIVE_ASSETS_DIR)/native_assets.json\n" > ios/Flutter/Release.xcconfig

      - name: Instalar CocoaPods (si es necesario)
        run: |
          sudo gem install cocoapods --no-document
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..

      - name: Generar Iconos
        run: |
          dart run flutter_launcher_icons

      - name: Crear App sin firma
        run: |
          # Set environment variables for the build
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM="ABCDEFGH12" # Dummy team ID
          export CODE_SIGN_ENTITLEMENTS=""
          export CODE_SIGNING_METHOD=manual
          
          # Limpiar caché de compilación para asegurar nuevos assets
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock

          # Crear directorio y manifiesto dummy para evitar el crash de 'Null check operator' en xcode_backend.dart
          mkdir -p build/native_assets
          touch build/native_assets/native_assets.json
          export NATIVE_ASSETS_DIR="$(pwd)/build/native_assets"
          
          # Compilación forzando la omisión de firma de código
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1 \
            --no-tree-shake-icons
          
          # Empaquetado usando 'ditto' para preservar recursos de iOS correctamente
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload mi_aplicacion.ipa

      - name: Diagnosticar Info.plist
        run: |
          set -e
          if [ -f Payload/Runner.app/Info.plist ]; then
            plutil -p Payload/Runner.app/Info.plist > info_plist_dump.txt || true
            echo "---- file type ----" > info_plist_file.txt
            file Payload/Runner.app/Info.plist >> info_plist_file.txt || true
            xxd -l 256 Payload/Runner.app/Info.plist > info_plist_hexdump.txt || true
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt info_plist_file.txt info_plist_hexdump.txt || true
          else
            echo "Info.plist not found" > info_plist_dump.txt
            tar -czf info_plist_diag.tar.gz info_plist_dump.txt || true
          fi

      - name: Subir diagnóstico Info.plist
        uses: actions/upload-artifact@v4
        with:
          name: info-plist-diag
          path: info_plist_diag.tar.gz

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
