name: "Generar IPA para AltStore"
on:
  workflow_dispatch:

jobs:
  build:
    name: Compilando en macOS
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generar Iconos y Preparar Dependencias
        run: |
          flutter clean
          flutter pub get
          
          # Cambiar Bundle Identifier para evitar el default de com.example
          sed -i '' 's/com.example.myapp/com.glyph.app/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Ajustar el target para compatibilidad (iOS 13.0)
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Solución mínima para Xcode 15+ (Desactivar Sandboxing de scripts)
          echo "ENABLE_USER_SCRIPT_SANDBOXING = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> ios/Flutter/Generated.xcconfig
          if [ -f ios/Podfile ]; then
            sed -i '' "s/^[# ]*platform :ios, .*/platform :ios, '13.0'/g" ios/Podfile
            sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each { |config| \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["ENABLE_USER_SCRIPT_SANDBOXING"] = "NO" \
                }' ios/Podfile
          fi
          dart run flutter_launcher_icons
          cd ios && pod install && cd ..

      - name: Crear App sin firma
        run: |
          flutter build ios --release --no-codesign \
            --build-name=1.0.0 --build-number=1 \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mi_aplicacion.ipa Payload/

      - name: Guardar archivo final
        uses: actions/upload-artifact@v4 # Actualizado a v4
        with:
          name: app-bundle
          path: mi_aplicacion.ipa
